version: '3.9'

services:
  backend:
    build:
      context: ./backend
    image: shelfsense-backend:latest
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - shelfsense_data:/app/data
    environment:
      - APP_MODE=${APP_MODE:-demo}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_FROM=${TWILIO_FROM:-whatsapp:+14155238886}
      - TWILIO_TO=${TWILIO_TO:-}
      - DB_PATH=/app/data/shelfsense.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8000
        - VITE_WS_URL=ws://localhost:8000
    image: shelfsense-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  shelfsense_data:
